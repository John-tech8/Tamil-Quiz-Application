<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>தமிழ் வினாடி வினா</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Poppins', sans-serif; background: #0f0c1a; color: #f0eaff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .app { width: 100%; max-width: 540px; }
  .header { text-align: center; margin-bottom: 28px; }
  .header h1 { font-family: 'Noto Sans Tamil', sans-serif; font-size: 2rem; font-weight: 700; color: #e2c4ff; letter-spacing: 1px; }
  .header p { font-size: 0.8rem; color: #9b7fc0; margin-top: 4px; }
  .card { background: #1a1430; border: 1px solid #2e2050; border-radius: 16px; padding: 28px; box-shadow: 0 8px 40px rgba(0,0,0,0.4); }
  .progress-bar { background: #2a1f45; border-radius: 8px; height: 6px; margin-bottom: 20px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #a855f7, #e879f9); border-radius: 8px; transition: width 0.4s ease; }
  .q-meta { display: flex; justify-content: space-between; font-size: 0.75rem; color: #9b7fc0; margin-bottom: 14px; }
  .question { font-family: 'Noto Sans Tamil', sans-serif; font-size: 1.1rem; font-weight: 600; color: #f0eaff; line-height: 1.6; margin-bottom: 22px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn { background: #241b3a; border: 1.5px solid #3a2860; border-radius: 10px; padding: 12px 16px; font-family: 'Noto Sans Tamil', sans-serif; font-size: 0.95rem; color: #d8c8f8; cursor: pointer; text-align: left; transition: all 0.2s ease; }
  .option-btn:hover:not(:disabled) { border-color: #a855f7; background: #2f2050; color: #fff; }
  .option-btn.correct { background: #14532d; border-color: #22c55e; color: #bbf7d0; }
  .option-btn.wrong { background: #4c1414; border-color: #ef4444; color: #fecaca; }
  .option-btn:disabled { cursor: default; }
  .feedback { margin-top: 16px; font-size: 0.85rem; font-weight: 600; min-height: 20px; text-align: center; }
  .feedback.correct { color: #4ade80; }
  .feedback.wrong { color: #f87171; }
  .next-btn { margin-top: 20px; width: 100%; padding: 13px; background: linear-gradient(135deg, #a855f7, #e879f9); border: none; border-radius: 10px; color: #fff; font-family: 'Poppins', sans-serif; font-size: 0.95rem; font-weight: 600; cursor: pointer; display: none; transition: opacity 0.2s; }
  .next-btn:hover { opacity: 0.9; }
  .score-screen { text-align: center; }
  .score-circle { width: 130px; height: 130px; border-radius: 50%; background: linear-gradient(135deg, #a855f7, #e879f9); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 20px; box-shadow: 0 0 40px rgba(168,85,247,0.4); }
  .score-circle .big { font-size: 2.2rem; font-weight: 700; line-height: 1; }
  .score-circle .small { font-size: 0.75rem; color: #e9d5ff; }
  .score-msg { font-size: 1rem; color: #c4b0f0; margin-bottom: 24px; }
  .action-row { display: flex; gap: 10px; }
  .action-btn { flex: 1; padding: 11px; border-radius: 10px; font-family: 'Poppins', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none; transition: opacity 0.2s; }
  .action-btn:hover { opacity: 0.85; }
  .btn-primary { background: linear-gradient(135deg, #a855f7, #e879f9); color: #fff; }
  .btn-secondary { background: #2e2050; color: #d8c8f8; }
  .add-screen h2 { font-family: 'Noto Sans Tamil', sans-serif; font-size: 1.1rem; color: #e2c4ff; margin-bottom: 18px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 0.75rem; color: #9b7fc0; margin-bottom: 5px; font-family: 'Noto Sans Tamil', sans-serif; }
  .form-group input { width: 100%; background: #241b3a; border: 1.5px solid #3a2860; border-radius: 8px; padding: 10px 12px; color: #f0eaff; font-family: 'Noto Sans Tamil', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
  .form-group input:focus { border-color: #a855f7; }
  .correct-label { font-size: 0.72rem; color: #9b7fc0; margin-bottom: 6px; }
  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 6px; }
  .opt-wrap { position: relative; }
  .opt-wrap input[type="text"] { padding-right: 32px; }
  .correct-radio { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; accent-color: #a855f7; cursor: pointer; }
  .add-submit-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #a855f7, #e879f9); border: none; border-radius: 10px; color: #fff; font-family: 'Poppins', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; margin-top: 6px; transition: opacity 0.2s; }
  .add-submit-btn:hover { opacity: 0.9; }
  .back-link { display: inline-block; margin-top: 12px; font-size: 0.8rem; color: #9b7fc0; cursor: pointer; text-align: center; width: 100%; }
  .back-link:hover { color: #d8c8f8; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #22c55e; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 999; }
  .toast.show { opacity: 1; }
  .home-screen { text-align: center; }
  .home-screen p { color: #9b7fc0; font-size: 0.9rem; margin-bottom: 24px; line-height: 1.6; }
  .home-screen .big-start { width: 100%; padding: 14px; background: linear-gradient(135deg, #a855f7, #e879f9); border: none; border-radius: 12px; color: #fff; font-family: 'Poppins', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; margin-bottom: 12px; transition: opacity 0.2s; }
  .home-screen .big-start:hover { opacity: 0.9; }
  .home-screen .add-qs-link { font-size: 0.85rem; color: #9b7fc0; cursor: pointer; text-decoration: underline; }
  .home-screen .add-qs-link:hover { color: #d8c8f8; }
  .q-count-badge { display: inline-block; background: #2e2050; border-radius: 20px; padding: 3px 12px; font-size: 0.75rem; color: #c4b0f0; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>தமிழ் வினாடி வினா</h1>
    <p>Tamil Language Quiz</p>
  </div>
  <div class="card" id="main-card"></div>
</div>
<div class="toast" id="toast"></div>
<script>
const DEFAULT_QUESTIONS = [
  { q: "தமிழ் எழுத்துக்களின் மொத்த எண்ணிக்கை எத்தனை?", options: ["அ) 216", "ஆ) 247", "இ) 312", "ஈ) 180"], correct: 1 },
  { q: "தமிழில் உயிர் எழுத்துக்கள் எத்தனை?", options: ["அ) 10", "ஆ) 12", "இ) 18", "ஈ) 15"], correct: 1 },
  { q: "தமிழில் மெய் எழுத்துக்கள் எத்தனை?", options: ["அ) 16", "ஆ) 18", "இ) 20", "ஈ) 21"], correct: 2 },
  { q: "திருக்குறளை இயற்றியவர் யார்?", options: ["அ) கம்பர்", "ஆ) இளங்கோவடிகள்", "இ) திருவள்ளுவர்", "ஈ) சுந்தரர்"], correct: 2 },
  { q: "திருக்குறளில் மொத்தம் எத்தனை குறள்கள் உள்ளன?", options: ["அ) 1000", "ஆ) 1330", "இ) 1008", "ஈ) 1200"], correct: 1 },
  { q: "சிலப்பதிகாரம் யாரால் எழுதப்பட்டது?", options: ["அ) திருவள்ளுவர்", "ஆ) கம்பர்", "இ) இளங்கோவடிகள்", "ஈ) ஔவையார்"], correct: 2 },
  { q: "தமிழின் முதல் எழுத்து எது?", options: ["அ) ஆ", "ஆ) அ", "இ) இ", "ஈ) க"], correct: 1 },
  { q: "'அன்னை மொழியே' என்பது எதை குறிக்கிறது?", options: ["அ) ஆங்கிலம்", "ஆ) தாய்மொழி", "இ) சமஸ்கிருதம்", "ஈ) இந்தி"], correct: 1 },
  { q: "தமிழ்நாட்டின் தலைநகரம் எது?", options: ["அ) மதுரை", "ஆ) கோயம்புத்தூர்", "இ) சென்னை", "ஈ) திருச்சி"], correct: 2 },
  { q: "கம்பராமாயணம் எந்த மொழியில் எழுதப்பட்டது?", options: ["அ) சமஸ்கிருதம்", "ஆ) தெலுங்கு", "இ) மலையாளம்", "ஈ) தமிழ்"], correct: 3 },
  { q: "தமிழில் 'வணக்கம்' என்பதன் பொருள் என்ன?", options: ["அ) Good Night", "ஆ) Hello / Greetings", "இ) Thank You", "ஈ) Goodbye"], correct: 1 },
  { q: "'ஔவை' என்பவர் யார்?", options: ["அ) ஒரு மன்னர்", "ஆ) ஒரு நடிகர்", "இ) ஒரு பெண் கவிஞர்", "ஈ) ஒரு இசைவாணர்"], correct: 2 },
];
let allQuestions = [...DEFAULT_QUESTIONS];
let quizQuestions = [], current = 0, score = 0, answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}

function startQuiz() { quizQuestions = shuffle(allQuestions).slice(0, 10); current = 0; score = 0; answered = false; renderQuestion(); }

function renderHome() {
  document.getElementById('main-card').innerHTML = `
    <div class="home-screen">
      <div class="q-count-badge">📚 ${allQuestions.length} கேள்விகள் உள்ளன</div>
      <p>தமிழ் மொழி, இலக்கியம் மற்றும் பண்பாடு பற்றிய 10 கேள்விகளுக்கு விடை அளியுங்கள்!</p>
      <button class="big-start" onclick="startQuiz()">வினாடி வினா தொடங்கு 🚀</button>
      <div class="add-qs-link" onclick="renderAdd()">+ புதிய கேள்வி சேர்க்கவும்</div>
    </div>`;
}

function renderQuestion() {
  const q = quizQuestions[current]; answered = false;
  document.getElementById('main-card').innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${(current/10)*100}%"></div></div>
    <div class="q-meta"><span>கேள்வி ${current+1} / 10</span><span>மதிப்பெண்: ${score}</span></div>
    <div class="question">${q.q}</div>
    <div class="options">${q.options.map((opt,i)=>`<button class="option-btn" onclick="pick(${i})">${opt}</button>`).join('')}</div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextQ()">${current<9?'அடுத்த கேள்வி →':'முடிவு காண்க ✓'}</button>`;
}

function pick(idx) {
  if (answered) return; answered = true;
  const q = quizQuestions[current];
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);
  const fb = document.getElementById('feedback');
  if (idx === q.correct) { score++; btns[idx].classList.add('correct'); fb.textContent='✅ சரியான விடை!'; fb.className='feedback correct'; }
  else { btns[idx].classList.add('wrong'); btns[q.correct].classList.add('correct'); fb.textContent='❌ தவறான விடை!'; fb.className='feedback wrong'; }
  document.getElementById('next-btn').style.display = 'block';
}

function nextQ() { current++; if (current >= 10) { renderScore(); return; } renderQuestion(); }

function renderScore() {
  const pct = Math.round((score/10)*100);
  const msg = score<=3?'மேலும் படிக்கவும்! 📖':score<=6?'நல்ல முயற்சி! 👍':score<=9?'மிகவும் நன்று! 🌟':'அருமை! பூரண மதிப்பெண்! 🏆';
  document.getElementById('main-card').innerHTML = `
    <div class="score-screen">
      <div class="score-circle"><span class="big">${score}/10</span><span class="small">${pct}%</span></div>
      <div class="score-msg">${msg}</div>
      <div class="action-row">
        <button class="action-btn btn-primary" onclick="startQuiz()">மீண்டும் விளையாடு</button>
        <button class="action-btn btn-secondary" onclick="renderAdd()">கேள்வி சேர்</button>
      </div>
      <div class="back-link" onclick="renderHome()" style="margin-top:14px">← முகப்பு</div>
    </div>`;
}

function renderAdd() {
  document.getElementById('main-card').innerHTML = `
    <div class="add-screen">
      <h2>புதிய கேள்வி சேர்க்கவும்</h2>
      <div class="form-group"><label>கேள்வி (Question)</label><input type="text" id="new-q" placeholder="உங்கள் கேள்வியை இங்கே தட்டச்சு செய்யவும்..."></div>
      <div class="form-group">
        <label>விடை விருப்பங்கள் (radio = சரியான விடை)</label>
        <div class="options-grid">${[0,1,2,3].map(i=>`<div class="opt-wrap"><input type="text" id="opt-${i}" placeholder="விருப்பம் ${i+1}"><input type="radio" name="correct" value="${i}" class="correct-radio" ${i===0?'checked':''}></div>`).join('')}</div>
        <div class="correct-label">📻 சரியான விடைக்கு radio பொத்தானை தேர்வு செய்யவும்</div>
      </div>
      <button class="add-submit-btn" onclick="submitQuestion()">சேர்க்கவும் ✓</button>
      <div class="back-link" onclick="renderHome()">← முகப்பு</div>
    </div>`;
}

function submitQuestion() {
  const q = document.getElementById('new-q').value.trim();
  const opts = [0,1,2,3].map(i => document.getElementById('opt-'+i).value.trim());
  const correct = parseInt(document.querySelector('input[name="correct"]:checked').value);
  if (!q) { showToast('கேள்வியை உள்ளிடவும்!','#ef4444'); return; }
  if (opts.some(o=>!o)) { showToast('அனைத்து விருப்பங்களையும் நிரப்பவும்!','#ef4444'); return; }
  allQuestions.push({ q, options: opts, correct });
  showToast('கேள்வி சேர்க்கப்பட்டது! ✅');
  setTimeout(renderHome, 1400);
}

function showToast(msg, color='#22c55e') {
  const t = document.getElementById('toast'); t.textContent=msg; t.style.background=color; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

renderHome();
</script>
</body>
</html>
